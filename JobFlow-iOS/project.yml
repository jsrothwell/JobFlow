name: Jobflo

options:
  bundleIdPrefix: com.jobflow
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: Q32VJ268M9

configs:
  Debug: debug
  Release: release

targets:

  # ─────────────────────────────────────────────
  # Main iOS App
  # ─────────────────────────────────────────────
  Jobflo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # iOS-specific app files
      - path: Jobflo
        excludes:
          - "*.entitlements"
      # Shared files compiled from the macOS project (platform guards handle exclusions)
      - path: ../JobFlow-macOS-App/JobFlow/JobFlowApp.swift   # provides JobStore; macOS App struct is #if os(macOS) guarded
        group: Shared
      - path: ../JobFlow-macOS-App/JobFlow/JobApplication.swift
        group: Shared/Models
      - path: ../JobFlow-macOS-App/JobFlow/Interview.swift
        group: Shared/Models
      - path: ../JobFlow-macOS-App/JobFlow/Contact.swift
        group: Shared/Models
      - path: ../JobFlow-macOS-App/JobFlow/ThemeManager.swift
        group: Shared
      - path: ../JobFlow-macOS-App/JobFlow/ToastNotification.swift
        group: Shared
    entitlements:
      path: Jobflo/Jobflo.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jobflow.ios
    info:
      path: Jobflo/Info.plist
      properties:
        CFBundleDisplayName: Jobflo
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: ""   # placeholder — remove if camera unused
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jobflow.ios
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Jobflo/Info.plist
    dependencies:
      - target: JobfloShareExtension

  # ─────────────────────────────────────────────
  # Share Extension
  # ─────────────────────────────────────────────
  JobfloShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: JobfloShareExtension
        excludes:
          - Info.plist
          - "*.entitlements"
      - path: ../JobFlow-macOS-App/JobFlow/JobApplication.swift
        group: Shared/Models
      - path: ../JobFlow-macOS-App/JobFlow/Interview.swift
        group: Shared/Models
    entitlements:
      path: JobfloShareExtension/JobfloShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jobflow.ios
    info:
      path: JobfloShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Jobflo Share
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionPointIdentifier: com.apple.share-services
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jobflow.ios.share
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: JobfloShareExtension/Info.plist
